services:

  # SV2 Template Provider
  sv2_tp:
    build:
      dockerfile: sv2-tp.Dockerfile
    container_name: sv2_tp
    volumes:
      # - "/Users/lucasbalieiro/Library/Application Support/Bitcoin/:/app/bitcoin"
      - "${BITCOIN_SOCKET_PATH?}:/app/bitcoin/signet/node.sock"
    ports:
      - "8442:8442"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.10
    restart: unless-stopped
    profiles:
      - sv2_tp
      - pool_apps
      - all

  # Pool SV2 Service
  pool_sv2:
    image: luskabalieiro/pool_sv2:v0.1.0
    container_name: pool_sv2
    volumes:
      - ./config/pool-config.toml:/app/pool-config.toml:ro
      - "${BITCOIN_SOCKET_PATH?}:/app/node.sock"
    ports:
      - "34254:34254"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.11
    restart: unless-stopped
    profiles:
      - pool_apps
      - all

  # JD Server SV2 Service
  jds_sv2:
    image: luskabalieiro/jd_server:v0.1.0
    container_name: jd_server_sv2
    volumes:
      - ./config/jds-config.toml:/app/jds-config.toml:ro
    ports:
      - "34264:34264"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.12
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - all

  # JD Client SV2 Service
  jd_client_sv2:
    image: luskabalieiro/jd_client_sv2:v0.1.0
    container_name: jd_client_sv2
    volumes:
      - ./config/jdc-config.toml:/app/jdc-config.toml:ro
      - "${BITCOIN_SOCKET_PATH?}:/app/node.sock"
    ports:
      - "34265:34265"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.13
    restart: unless-stopped
    profiles:
      - miner_apps
      - all

  # Translator Proxy SV2 Service
  tproxy_sv2:
    image: luskabalieiro/translator_sv2:v0.1.0
    container_name: tproxy_sv2
    volumes:
      - ./config/proxy-config.toml:/app/proxy-config.toml:ro
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.14
    depends_on:
      - jd_client_sv2
    ports:
      - "34255:34255"
    restart: unless-stopped
    profiles:
      - miner_apps
      - all

networks:
  sv2_apps:
    ipam:
      config:
        - subnet: 172.28.0.0/16

