services:
    # Pool SV2 Service
  pool_sv2:
    image: sv2-pool:local
    container_name: pool_sv2
    volumes:
      - ./config/pool-config.toml:/app/pool-config.toml:ro
      - /Users/lucasbalieiro/Library/Application Support/Bitcoin/signet/node.sock:/app/node.sock
    ports:
      - "34254:34254"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.11
    restart: unless-stopped

  # JD Server SV2 Service
  jds_sv2:
    image: sv2-jd-server:local
    container_name: jd_server_sv2
    volumes:
      - ./config/jds-config.toml:/app/jds-config.toml:ro
    ports:
      - "34264:34264"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.12
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" #172.17.0.1 (?) isso vai ser um porre no linux

  # JD Client SV2 Service
  jd_client_sv2:
    image: sv2-jd-client:local
    container_name: jd_client_sv2
    volumes:
      - ./config/jdc-config.toml:/app/jdc-config.toml:ro
      - /Users/lucasbalieiro/Library/Application Support/Bitcoin/signet/node.sock:/app/node.sock
    ports:
      - "34265:34265"
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.13
    restart: unless-stopped

  # Translator Proxy SV2 Service
  tproxy_sv2:
    image: sv2-translator:local
    container_name: tproxy_sv2
    volumes:
      - ./config/proxy-config.toml:/app/proxy-config.toml:ro
    networks:
      sv2_apps:
        ipv4_address: 172.28.0.14
    depends_on:
      - jd_client_sv2
    ports:
      - "34255:34255"
    restart: unless-stopped

networks:
  sv2_apps:
    ipam:
      config:
        - subnet: 172.28.0.0/16

