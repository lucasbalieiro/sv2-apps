name: Release Build and Docker Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-release-assets-linux:
    name: Build & Upload Rust Binaries (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build, Package, and Tar.gz All Binaries (Linux)
        run: |
          set -e
          arch_suffix="_x86_64-unknown-linux-musl"
          declare -A binary_names=(
            ["miner-apps/jd-client"]="jd_client"
            ["miner-apps/translator"]="translator_sv2"
            ["pool-apps/jd-server"]="jd_server"
            ["pool-apps/pool"]="pool_sv2"
          )
          declare -A workspace_roots=(
            ["miner-apps/jd-client"]="miner-apps"
            ["miner-apps/translator"]="miner-apps"
            ["pool-apps/jd-server"]="pool-apps"
            ["pool-apps/pool"]="pool-apps"
          )
          mkdir -p dist
          for app_path in "${!binary_names[@]}"; do
            binary_name="${binary_names[$app_path]}"
            workspace_root="${workspace_roots[$app_path]}"
            config_path="${app_path}/config-examples"

            echo "🔨 Building $binary_name..."
            cargo build --manifest-path "$app_path/Cargo.toml" --release --target x86_64-unknown-linux-musl

            binary_path="$workspace_root/target/x86_64-unknown-linux-musl/release/$binary_name"
            [ -f "$binary_path" ] || { echo "❌ Missing binary: $binary_path"; exit 1; }

            echo "📦 Packaging $binary_name..."
            package_dir="dist/$binary_name"
            mkdir -p "$package_dir"
            cp "$binary_path" "$package_dir/"
            [ -d "$config_path" ] && cp -r "$config_path" "$package_dir/config-examples"
            tar -czf "dist/${binary_name}${arch_suffix}.tar.gz" -C dist "$binary_name"
            rm -rf "$package_dir"
          done

      - name: Upload tarballs to GitHub Release (Linux)
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-assets-macos:
    name: Build & Upload Rust Binaries (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build, Package, and Tar.gz All Binaries (macOS)
        run: |
          set -e
          arch_suffix="_x86_64-apple-darwin"

          binaries=(
            "miner-apps/jd-client:jd_client:miner-apps"
            "miner-apps/translator:translator_sv2:miner-apps"
            "pool-apps/jd-server:jd_server:pool-apps"
            "pool-apps/pool:pool_sv2:pool-apps"
          )

          mkdir -p dist

          for entry in "${binaries[@]}"; do
            IFS=":" read -r app_path binary_name workspace_root <<< "$entry"
            config_path="${app_path}/config-examples"

            echo "🔨 Building $binary_name..."
            cargo build --manifest-path "$app_path/Cargo.toml" --release

            binary_path="$workspace_root/target/release/$binary_name"
            if [ ! -f "$binary_path" ]; then
              echo "❌ Missing binary: $binary_path"
              exit 1
            fi

            echo "📦 Packaging $binary_name..."
            package_dir="dist/$binary_name"
            mkdir -p "$package_dir"
            cp "$binary_path" "$package_dir/"

            if [ -d "$config_path" ]; then
              cp -r "$config_path" "$package_dir/config-examples"
            else
              echo "⚠️ Warning: No config-examples found for $binary_name"
            fi

            tarball_name="${binary_name}${arch_suffix}.tar.gz"
            tar -czf "dist/$tarball_name" -C dist "$binary_name"
            rm -rf "$package_dir"
          done

      - name: Upload tarballs to GitHub Release (macOS)
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-release-assets-linux]
    strategy:
      matrix:
        component: [jd_client, jd_server, pool_sv2, translator_sv2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image for ${{ matrix.component }}
        working-directory: ./docker
        run: |
          docker build \
            --build-arg SV2_APP=${{ matrix.component }} \
            --build-arg CONFIG_FILE= \
            --build-arg GITHUB_REPO=${{ github.repository }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.component }}:${{ github.event.release.tag_name }} \
            -f Dockerfile .

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.component }}:${{ github.event.release.tag_name }}

